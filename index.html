<!DOCTYPE html>
<html>
<head>
  <!-- Using stable pinned versions for better compatibility -->
  <script src="https://cdn.jsdelivr.net/npm/p5@1.4.0/lib/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/ml5@0.12.2/dist/ml5.min.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; background: #f0f0f0; overflow: hidden; }
    #console { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: #0f0; padding: 10px; border-radius: 5px; font-size: 12px; pointer-events: none; z-index: 100; }
  </style>
</head>
<body>
  <div id="console">Status: Starting...</div>
  <script>
    let handpose;
    let video;
    let predictions = [];
    const log = (msg) => { document.getElementById('console').innerText = "Status: " + msg; };

    function setup() {
      createCanvas(640, 480);
      log("Initializing Webcam...");
      
      video = createCapture(VIDEO, (stream) => {
        log("Webcam Active. Loading Handpose Model...");
      });
      video.size(width, height);
      video.hide();

      // Stable version initialization
      handpose = ml5.handpose(video, () => {
        log("Model Loaded! Tracking active.");
      });

      handpose.on("predict", (results) => {
        predictions = results;
      });
    }

    function draw() {
      image(video, 0, 0, width, height);
      if (predictions.length > 0) {
        drawKeypoints();
      }
    }

    function drawKeypoints() {
      for (let i = 0; i < predictions.length; i++) {
        const prediction = predictions[i];
        for (let j = 0; j < prediction.landmarks.length; j++) {
          const [x, y] = prediction.landmarks[j];
          fill(0, 255, 0);
          noStroke();
          ellipse(x, y, 10, 10);
        }
      }
    }
  </script>
</body>
</html>
